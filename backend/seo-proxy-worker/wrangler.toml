name = "procv-seo-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "3b2dc03a15c292df3054249f73a321bb"
workers_dev = true

# ── Secrets (set once via: wrangler secret put <KEY>) ─────────────────────────
# ORIGIN_URL  — full URL of your deployed app, e.g. https://your-app.vercel.app
#               Run: cd backend/seo-proxy-worker && npx wrangler secret put ORIGIN_URL
#
# ── When your domain is ready, add routes: ────────────────────────────────────
# [[routes]]
# pattern = "procv.com/*"
# zone_name = "procv.com"
#
# [[routes]]
# pattern = "www.procv.com/*"
# zone_name = "procv.com"
#
# Then: npx wrangler deploy — CF handles SSL and routing automatically.
# ──────────────────────────────────────────────────────────────────────────────

[vars]
HTML_CACHE_TTL  = "300"
ASSET_CACHE_TTL = "31536000"

[observability]
enabled = true
