name = "cv-engine-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
account_id = "3b2dc03a15c292df3054249f73a321bb"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[d1_databases]]
binding = "CV_DB"
database_name = "cv-engine-db"
database_id = "5193fa77-54c8-4e49-bf3a-c615af170191"

[[kv_namespaces]]
binding = "CV_KV"
id = "8e1722f00d9641b7a8f611b76dac8361"
preview_id = "d9bc7d2a01f94e619b3054c19b8dc44f"

[ai]
binding = "AI"

# ─── Required secrets (set once via: wrangler secret put <KEY>) ───────────────
# ADMIN_TOKEN       — bootstrap admin token for /api/cv/* admin endpoints
# BREVO_API_KEY     — Brevo (Sendinblue) key for email magic-link sign-ins
#                     Get from: https://app.brevo.com/settings/keys/api
#                     Verify your sender domain at: https://app.brevo.com/senders
# ──────────────────────────────────────────────────────────────────────────────

# Phase I: nightly leak-miner promotion at 03:15 UTC
[cache]
# Workers Tiered Cache — responses with Cache-Control: public are stored at CF's
# upper-tier PoP so subsequent requests from any region are served without running
# the Worker at all. Zero cost on free plan; no KV reads, no D1 reads on CF hits.
# Affects: GET /api/cv/llm-cache (1 hr client / 24 hr edge) and
#          GET /api/cv/examples  (1 hr client / 24 hr edge).
enabled = true

# ─── Native rate limiting (replaces KV-based rate limiter) ───────────────────
# Workers Rate Limiting API — cross-isolate, zero KV cost, free tier 1M/day.
# Each binding maps to one tier. namespace_id is an arbitrary unique integer.
# The KV fallback in utils.ts still covers local dev (where bindings don't exist).
[[unsafe.bindings]]
type = "ratelimit"
name = "RL_LLM"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

[[unsafe.bindings]]
type = "ratelimit"
name = "RL_MEDIUM"
namespace_id = "1002"
simple = { limit = 40, period = 60 }

[[unsafe.bindings]]
type = "ratelimit"
name = "RL_CACHE"
namespace_id = "1003"
simple = { limit = 120, period = 60 }

[triggers]
crons = ["15 3 * * *"]

[vars]
ALLOWED_ORIGINS = "https://resume-cv-gold.vercel.app,https://procv.replit.app,https://0d46ea6d-50c5-4dfc-8593-353b638052bf-00-e5mk26rqmqbe.worf.replit.dev"

[env.dev.vars]
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5000,http://localhost:3000"
