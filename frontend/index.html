<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>ProCV — Your Personal Career Consultant</title>

  <!-- PWA Manifest & Theme -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1B2B4B" />

  <!-- Apple PWA-specific meta tags -->
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ProCV" />

  <!-- Polyfills — run before any ES module so library code can rely on them -->
  <script>
    // Map.prototype.getOrInsertComputed — ES2026, used by pdfjs-dist v5.7+.
    // Not yet available in all browsers as of mid-2026.
    if (typeof Map !== 'undefined' && typeof Map.prototype.getOrInsertComputed !== 'function') {
      Map.prototype.getOrInsertComputed = function(key, callbackfn) {
        if (!this.has(key)) this.set(key, callbackfn(key));
        return this.get(key);
      };
    }
  </script>

  <!-- jsPDF — loaded globally for PDF generation (pdfService.ts uses window.jspdf).
       `defer` keeps this off the critical rendering path — it still finishes
       loading (in document order) before any user-triggered download, which
       only ever happens well after first paint. -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Fonts — app UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!--
    All 4 font stylesheets below use the standard non-blocking "preload + swap"
    pattern: the browser fetches them at high priority WITHOUT blocking the
    first paint, then flips `rel` to `stylesheet` once loaded. Every family
    already uses `display=swap`, so text renders immediately in a fallback
    font and swaps in place — no invisible-text flash either way. The <noscript>
    fallback covers the (rare) no-JS case.
    Only the first stylesheet (Playfair Display + DM Sans) is used by the core
    app chrome; the other three are CV-template font pairings only needed once
    a user opens the builder/template gallery, but loading them this way costs
    nothing on the critical path, so no separate lazy-inject logic is needed.
  -->
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap">
  <!-- Fonts — CV template pairings -->
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Raleway:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Lato:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;600;700&family=Open+Sans:wght@400;600&family=IBM+Plex+Serif:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600;700&family=Proza+Libre:wght@400;600&family=Crimson+Pro:wght@400;600&family=JetBrains+Mono:wght@400;500;700&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap">
  <!-- Fonts — extended pairings (Space Grotesk, Manrope, Sora, Outfit, Fraunces, DM Serif Display, Spectral) -->
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Serif+Display:ital@0;1&family=Spectral:ital,wght@0,400;0,600;0,700;1,400&display=swap">
  <!-- Fonts — extended pairings batch 2 -->
  <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Rubik:wght@400;500;600;700&family=Urbanist:wght@400;500;600;700&family=Josefin+Sans:wght@400;600;700&family=Figtree:wght@400;500;600;700&family=Red+Hat+Display:wght@400;500;600;700&family=Red+Hat+Text:wght@400;500;600&family=Lexend:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=Libre+Franklin:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Zilla+Slab:wght@400;500;600;700&family=Bitter:ital,wght@0,400;0,600;0,700;1,400&family=Domine:wght@400;600;700&family=Roboto+Slab:wght@400;600;700&family=Philosopher:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;700&family=Fira+Code:wght@400;500;700&family=Source+Code+Pro:wght@400;500;700&display=swap">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap">
  </noscript>
</head>

<body class="bg-zinc-50 dark:bg-neutral-900 text-zinc-900 dark:text-zinc-50 antialiased">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
